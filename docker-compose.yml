services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cspams-backend
    init: true
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_HOME: /tmp/composer-cache
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:5173}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      CACHE_STORE: ${CACHE_STORE:-database}
      PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS:-4}
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 8000) ? 0 : 1);'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    command: >
      sh -lc "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist --no-progress; fi &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi &&
      if [ \"${DB_CONNECTION:-sqlite}\" = \"sqlite\" ]; then mkdir -p database && touch database/database.sqlite; fi &&
      php artisan migrate --force &&
      PHP_CLI_SERVER_WORKERS=${PHP_CLI_SERVER_WORKERS:-4} php artisan serve --host=0.0.0.0 --port=8000
      "

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cspams-queue
    init: true
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_HOME: /tmp/composer-cache
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:5173}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      CACHE_STORE: ${CACHE_STORE:-database}
    command: >
      sh -lc "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist --no-progress; fi &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi &&
      if [ \"${DB_CONNECTION:-sqlite}\" = \"sqlite\" ]; then mkdir -p database && touch database/database.sqlite; fi &&
      php artisan queue:work --sleep=3 --tries=3 --max-time=3600
      "

  frontend:
    image: node:20-alpine
    container_name: cspams-frontend
    init: true
    restart: unless-stopped
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-npm-cache:/root/.npm
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      NODE_ENV: development
    command: >
      sh -lc "
      if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci --no-audit --no-fund; fi &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  composer-cache:
  frontend-node-modules:
  frontend-npm-cache:
